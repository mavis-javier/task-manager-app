name: CI/CD for Task Manager App

on:
  push:
    branches:
      - main

# permissions for AWS
permissions: 
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '25'
          
      - name: Build with Maven
        run: mvn clean package

      - name: Debug Maven Build Output
        run: ls -R target

      - name: Check for Artifacts
        run: |
          if [ ! -f target/*.jar ]; then
            echo "Error: No artifacts found in target directory."
            exit 1
          fi

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-application
          path: target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
  
    steps:
    # Step 1: Configure AWS Credentials using secure OIDC (no hardcoded passwords)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::599073465115:role/root
          aws-region: us-east-2
          
      # Step 2: Get the runner's current public IP
      - name: Get GitHub Runner Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT
  
      # Step 3: Open MySQL Port (3306) in your dedicated security group
      - name: Whitelist Runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id sg-016c99830a076940b \
            --protocol tcp \
            --port 3306 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
  
      # Step 4: Run your MySQL scripts or migrations
      #- name: Run MySQL Tasks
      #  run: |
      #    mysql -h ://amazonaws.com -u ${{ secrets.DB_USER }} -p${{ secrets.DB_PASSWORD }} -e "SHOW DATABASES;"
  
      # Continue original CI/CD workflow    
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packaged-application
          path: target/
  
      - name: Setup key
        id: setup-key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "$DEPLOY_KEY" >> $HOME/key.pem
          chmod 400 $HOME/key.pem
  
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ec2-user
          key: ${{ secrets.DEPLOY_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/deployment/"

      # Step 5: Clean up and close the port (Runs automatically even if Step 4 fails)
      - name: Revoke Runner IP
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id sg-016c99830a076940b \
            --protocol tcp \
            --port 3306 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      # part of original CI/CD workflow
      - name: Connect SSH and Restart Services
        run: |
          ssh -o StrictHostKeyChecking=no -i $HOME/key.pem ec2-user@${{ secrets.DEPLOY_HOST }} '
            sudo systemctl restart spring-boot-app
          '
